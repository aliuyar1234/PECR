openapi: 3.1.0
info:
  title: PECR API
  version: 1.0.0
  description: |
    Versioned API contract for PECR v1.
servers:
  - url: http://127.0.0.1:8080
    description: Gateway
  - url: http://127.0.0.1:8081
    description: Controller
paths:
  /healthz:
    get:
      summary: Liveness probe
      operationId: healthz
      responses:
        "200":
          description: Service process is running
          content:
            text/plain:
              schema:
                type: string
                const: ok
  /readyz:
    get:
      summary: Readiness probe
      operationId: readyz
      responses:
        "200":
          description: Service and dependencies are ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyzResponse"
        "503":
          description: One or more critical dependencies are unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyzResponse"
  /metrics:
    get:
      summary: Prometheus metrics
      operationId: metrics
      responses:
        "200":
          description: Metrics scrape
          content:
            text/plain:
              schema:
                type: string
        "500":
          description: Metrics rendering failed
  /v1/sessions:
    post:
      summary: Create policy-bound session
      operationId: createSession
      security:
        - PecrLocalPrincipal: []
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XPecrRequestId"
        - $ref: "#/components/parameters/XPecrTraceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [budget]
              properties:
                budget:
                  $ref: "#/components/schemas/Budget"
                as_of_time:
                  type: string
      responses:
        "200":
          description: Session created
          headers:
            x-pecr-session-token:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [session_id, trace_id, policy_snapshot_id, budget]
                properties:
                  session_id:
                    type: string
                  trace_id:
                    type: string
                  policy_snapshot_id:
                    type: string
                  budget:
                    $ref: "#/components/schemas/Budget"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid principal credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Denied by policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Source unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/policies/capabilities:
    get:
      summary: Describe safe and useful ask categories for the current principal
      operationId: getPolicyCapabilities
      security:
        - PecrLocalPrincipal: []
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XPecrRequestId"
      responses:
        "200":
          description: Safe ask catalog derived from current policy narrowing hints
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SafeAskCatalog"
        "401":
          description: Missing or invalid principal credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Source unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/policies/simulate:
    post:
      summary: Simulate a policy decision
      operationId: simulatePolicy
      security:
        - PecrLocalPrincipal: []
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XPecrRequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicySimulationRequest"
      responses:
        "200":
          description: Policy simulation decision payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicySimulationResponse"
        "400":
          description: Invalid request payload or fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid principal credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Source unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "504":
          description: Policy engine timeout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/operators/{op_name}:
    post:
      summary: Execute allowlisted operator
      operationId: callOperator
      security:
        - PecrSessionToken: []
          PecrLocalPrincipal: []
        - PecrSessionToken: []
          BearerAuth: []
      parameters:
        - name: op_name
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/XPecrSessionToken"
        - $ref: "#/components/parameters/XPecrRequestId"
        - $ref: "#/components/parameters/XPecrTraceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [session_id, params]
              properties:
                session_id:
                  type: string
                params:
                  type: object
      responses:
        "200":
          description: Operator executed
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [terminal_mode, result]
                properties:
                  terminal_mode:
                    $ref: "#/components/schemas/TerminalMode"
                  result:
                    type: object
                  result_summary:
                    type: string
                  policy_decision:
                    $ref: "#/components/schemas/PolicyDecision"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Denied by policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Budget exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Unknown session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Session already finalized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "501":
          description: Allowlisted operator not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "504":
          description: Policy engine timeout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Source unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/finalize:
    post:
      summary: Finalize response with claim map gate
      operationId: finalize
      security:
        - PecrSessionToken: []
          PecrLocalPrincipal: []
        - PecrSessionToken: []
          BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XPecrSessionToken"
        - $ref: "#/components/parameters/XPecrRequestId"
        - $ref: "#/components/parameters/XPecrTraceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [session_id, response_text, claim_map]
              properties:
                session_id:
                  type: string
                response_text:
                  type: string
                claim_map:
                  $ref: "#/components/schemas/ClaimMap"
      responses:
        "200":
          description: Finalized
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [terminal_mode, trace_id, claim_map, response_text]
                properties:
                  terminal_mode:
                    $ref: "#/components/schemas/TerminalMode"
                  trace_id:
                    type: string
                  claim_map:
                    $ref: "#/components/schemas/ClaimMap"
                  response_text:
                    type: string
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Denied by policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Unknown session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Session already finalized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "504":
          description: Policy engine timeout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Source unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/capabilities:
    get:
      summary: Describe safe and useful ask categories through the controller
      operationId: getCapabilities
      security:
        - PecrLocalPrincipal: []
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XPecrRequestId"
        - $ref: "#/components/parameters/XPecrTraceId"
      responses:
        "200":
          description: Safe ask catalog for the current principal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SafeAskCatalog"
        "401":
          description: Missing or invalid principal credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Source unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/run:
    post:
      summary: Controller end-to-end run
      operationId: run
      security:
        - PecrLocalPrincipal: []
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/XPecrRequestId"
        - $ref: "#/components/parameters/XPecrTraceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [query]
              properties:
                query:
                  type: string
                budget:
                  $ref: "#/components/schemas/Budget"
      responses:
        "200":
          description: Finalized response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [terminal_mode, trace_id, claim_map, response_text]
                properties:
                  terminal_mode:
                    $ref: "#/components/schemas/TerminalMode"
                  trace_id:
                    type: string
                  claim_map:
                    $ref: "#/components/schemas/ClaimMap"
                  response_text:
                    type: string
                    description: User-displayable grounded answer text.
                  response_kind:
                    $ref: "#/components/schemas/ClientResponseKind"
              examples:
                supported:
                  summary: Fully grounded supported answer
                  value:
                    terminal_mode: SUPPORTED
                    trace_id: 01ARZ3NDEKTSV4RRFFQ69G5FAA
                    response_text: "The customer is active on the starter plan. Source: safe_customer_view_public row cust_public_1."
                    claim_map:
                      claim_map_id: claim-map-supported
                      terminal_mode: SUPPORTED
                      coverage_threshold: 0.95
                      coverage_observed: 1.0
                      claims:
                        - claim_id: "1111111111111111111111111111111111111111111111111111111111111111"
                          claim_text: "safe_customer_view_public row cust_public_1: status=active; plan_tier=starter"
                          status: SUPPORTED
                          evidence_unit_ids:
                            - "2222222222222222222222222222222222222222222222222222222222222222"
                partial_answer:
                  summary: Supported answer with unresolved remainder
                  value:
                    terminal_mode: SUPPORTED
                    trace_id: 01ARZ3NDEKTSV4RRFFQ69G5FAJ
                    response_kind: partial_answer
                    response_text: "SUPPORTED: Annual plans may request refunds within 30 days of purchase. UNKNOWN: The available evidence does not resolve every refund exception or override."
                    claim_map:
                      claim_map_id: claim-map-partial
                      terminal_mode: SUPPORTED
                      coverage_threshold: 0.95
                      coverage_observed: 1.0
                      notes: "Partial answer: supported claims are grounded, but some requested details remain unresolved."
                      claims:
                        - claim_id: "3333333333333333333333333333333333333333333333333333333333333333"
                          claim_text: "Annual plans may request refunds within 30 days of purchase."
                          status: SUPPORTED
                          evidence_unit_ids:
                            - "4444444444444444444444444444444444444444444444444444444444444444"
                        - claim_id: "5555555555555555555555555555555555555555555555555555555555555555"
                          claim_text: "The available evidence does not resolve every refund exception or override."
                          status: UNKNOWN
                          evidence_unit_ids: []
                ambiguous:
                  summary: Narrowing prompt instead of a weak answer
                  value:
                    terminal_mode: INSUFFICIENT_EVIDENCE
                    trace_id: 01ARZ3NDEKTSV4RRFFQ69G5FAH
                    response_kind: ambiguous
                    response_text: "UNKNOWN: the structured lookup is underspecified. Which field should I use for the customer lookup?"
                    claim_map:
                      claim_map_id: claim-map-ambiguous
                      terminal_mode: INSUFFICIENT_EVIDENCE
                      coverage_threshold: 0.95
                      coverage_observed: 1.0
                      clarification_prompt:
                        question: Which field should I use for the customer lookup?
                        options:
                          - customer status
                          - plan tier
                          - customer counts by plan tier
                      claims:
                        - claim_id: "6666666666666666666666666666666666666666666666666666666666666666"
                          claim_text: "The structured lookup is underspecified and needs a narrower field or filter."
                          status: UNKNOWN
                          evidence_unit_ids: []
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid principal credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal controller failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Authentication subsystem unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Gateway/source unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/replays:
    get:
      summary: List persisted replay metadata for the authenticated principal
      operationId: listReplays
      security:
        - PecrLocalPrincipal: []
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Maximum replay records to return.
        - name: engine_mode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EngineMode"
      responses:
        "200":
          description: Replay metadata records
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [replays]
                properties:
                  replays:
                    type: array
                    items:
                      $ref: "#/components/schemas/ReplayBundleMetadata"
        "401":
          description: Missing or invalid principal credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Replay store unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/replays/{run_id}:
    get:
      summary: Get full replay bundle for a run
      operationId: getReplay
      security:
        - PecrLocalPrincipal: []
        - BearerAuth: []
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Replay bundle payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplayBundle"
        "401":
          description: Missing or invalid principal credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Replay bundle not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Replay store unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/evaluations:
    post:
      summary: Submit replay evaluation and return computed result
      operationId: submitEvaluation
      security:
        - PecrLocalPrincipal: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplayEvaluationSubmission"
      responses:
        "200":
          description: Evaluation computed and persisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplayEvaluationResult"
        "400":
          description: Invalid evaluation parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid principal credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Replay store unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/evaluations/scorecards:
    get:
      summary: Compute run quality scorecards grouped by engine mode
      operationId: getRunQualityScorecards
      security:
        - PecrLocalPrincipal: []
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: engine_mode
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/EngineMode"
      responses:
        "200":
          description: Scorecards over persisted replay bundles
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [scorecards]
                properties:
                  scorecards:
                    type: array
                    items:
                      $ref: "#/components/schemas/RunQualityScorecard"
        "401":
          description: Missing or invalid principal credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Replay store unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/evaluations/{evaluation_id}:
    get:
      summary: Fetch persisted evaluation result
      operationId: getEvaluation
      security:
        - PecrLocalPrincipal: []
        - BearerAuth: []
      parameters:
        - name: evaluation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Evaluation result payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplayEvaluationResult"
        "401":
          description: Missing or invalid principal credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Evaluation result not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Replay store unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    PecrLocalPrincipal:
      type: apiKey
      in: header
      name: x-pecr-principal-id
      description: Local mode principal identity header (`PECR_AUTH_MODE=local`).
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: OIDC bearer token (`PECR_AUTH_MODE=oidc`).
    PecrSessionToken:
      type: apiKey
      in: header
      name: x-pecr-session-token
      description: Opaque session capability token returned from `POST /v1/sessions`.
  parameters:
    XPecrSessionToken:
      name: x-pecr-session-token
      in: header
      required: true
      schema:
        type: string
      description: Required for `/v1/operators/{op_name}` and `/v1/finalize`.
    XPecrRequestId:
      name: x-pecr-request-id
      in: header
      required: false
      schema:
        type: string
      description: Optional caller-provided id used for log correlation.
    XPecrTraceId:
      name: x-pecr-trace-id
      in: header
      required: false
      schema:
        type: string
      description: Optional trace id propagated across controller and gateway.
  schemas:
    ReadyzResponse:
      type: object
      additionalProperties: false
      required: [status, checks]
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        checks:
          type: object
          additionalProperties:
            type: boolean
    Budget:
      type: object
      additionalProperties: false
      required:
        - max_operator_calls
        - max_bytes
        - max_wallclock_ms
        - max_recursion_depth
      properties:
        max_operator_calls:
          type: integer
          minimum: 0
          maximum: 10000
        max_bytes:
          type: integer
          minimum: 0
          maximum: 67108864
        max_wallclock_ms:
          type: integer
          minimum: 0
          maximum: 300000
        max_recursion_depth:
          type: integer
          minimum: 0
          maximum: 20
        max_parallelism:
          type: integer
          minimum: 1
          maximum: 256
          description: Maximum concurrent operator calls for controller fan-out steps (baseline `search_ref_fetch_span` and RLM batch bridge calls). Defaults to 1 when omitted.
    TerminalMode:
      type: string
      enum:
        - SUPPORTED
        - INSUFFICIENT_EVIDENCE
        - INSUFFICIENT_PERMISSION
        - SOURCE_UNAVAILABLE
    ClientResponseKind:
      type: string
      description: |
        Optional client UX hint for `/v1/run` and error responses.
        Absent means the response is a normal supported answer without special handling.
      enum:
        - blocked
        - ambiguous
        - source_down
        - partial_answer
    EngineMode:
      type: string
      enum:
        - baseline
        - beam_planner
        - rlm
    PlannerIntent:
      type: string
      enum:
        - default
        - structured_lookup
        - structured_aggregation
        - evidence_lookup
        - version_review
        - structured_evidence_lookup
        - structured_aggregation_evidence
        - structured_version_review
    PlannerOperatorStep:
      type: object
      additionalProperties: false
      required:
        - kind
        - op_name
        - params
      properties:
        kind:
          type: string
          enum: [operator]
        op_name:
          type: string
          minLength: 1
        params:
          oneOf:
            - type: object
            - type: array
            - type: string
            - type: number
            - type: integer
            - type: boolean
            - type: null
    PlannerSearchRefFetchSpanStep:
      type: object
      additionalProperties: false
      required:
        - kind
        - max_refs
      properties:
        kind:
          type: string
          enum: [search_ref_fetch_span]
        max_refs:
          type: integer
          minimum: 1
    PlannerStep:
      oneOf:
        - $ref: "#/components/schemas/PlannerOperatorStep"
        - $ref: "#/components/schemas/PlannerSearchRefFetchSpanStep"
    PlannerHints:
      type: object
      additionalProperties: false
      required:
        - intent
        - recommended_path
      properties:
        intent:
          $ref: "#/components/schemas/PlannerIntent"
        recommended_path:
          type: array
          items:
            $ref: "#/components/schemas/PlannerStep"
    PlannerRecoveryContext:
      type: object
      additionalProperties: false
      required:
        - failed_step
        - failure_terminal_mode
        - attempted_path
      properties:
        failed_step:
          type: string
          minLength: 1
        failure_terminal_mode:
          $ref: "#/components/schemas/TerminalMode"
        attempted_path:
          type: array
          items:
            $ref: "#/components/schemas/PlannerStep"
    PlanRequest:
      type: object
      additionalProperties: false
      required:
        - schema_version
        - query
        - budget
        - planner_hints
        - available_operator_names
        - allow_search_ref_fetch_span
      properties:
        schema_version:
          type: integer
          minimum: 1
        query:
          type: string
          minLength: 1
        budget:
          $ref: "#/components/schemas/Budget"
        planner_hints:
          $ref: "#/components/schemas/PlannerHints"
        recovery_context:
          $ref: "#/components/schemas/PlannerRecoveryContext"
        available_operator_names:
          type: array
          items:
            type: string
            minLength: 1
        allow_search_ref_fetch_span:
          type: boolean
    PlanResponse:
